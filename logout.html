<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Logged Out — SHAFFAF</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>:root{--gold:#C9A84C;--bg:#0A0A0B;--bg2:#111114;--surface:#1E1E25;--border:rgba(255,255,255,.08);--text:#F0EDE6;--muted:#8A8880}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;padding:30px}.box{width:min(520px,95vw);background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:42px;text-align:center}h1{font-family:'Syne';font-size:36px;margin-bottom:12px}p{color:var(--muted);line-height:1.7;margin-bottom:28px}.btn{display:inline-flex;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:700}.gold{background:var(--gold);color:#080808}.ghost{border:1px solid var(--border);color:var(--muted);margin-left:10px}</style></head><body><div class="box"><h1>You’re logged out</h1><p>Your SHAFFAF demo session has been cleared. Go back home or open the dashboard again to choose a role.</p><a class="btn gold" href="index.html">Back Home</a><a class="btn ghost" href="dashboard.html">Dashboard</a></div><script>localStorage.removeItem('SHAFFAF_user_session');</script></body></html>
